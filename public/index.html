<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Downloader</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-sm sm:max-w-md md:max-w-lg mx-4">
        <h1 class="text-2xl font-bold text-center text-red-600 mb-6">YouTube Downloader</h1>
        
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">YouTube Video URL:</label>
            <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>

        <button onclick="fetchVideo()" class="w-full bg-red-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-red-700 transition duration-200">
            Get Link
        </button>

        <div id="result" class="mt-6 hidden">
            <h3 id="videoTitle" class="font-semibold text-gray-800 mb-2"></h3>
            <div id="downloadLinks" class="space-y-2"></div>
        </div>
    </div>

    <script>
        async function fetchVideo() {
            const url = document.getElementById('urlInput').value;
            if (!url) return alert('Please enter a URL');

            const resultDiv = document.getElementById('result');
            resultDiv.classList.remove('hidden');
            document.getElementById('videoTitle').innerText = "Loading...";

            try {
                const response = await fetch(`/api/download?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (data.error) {
                    document.getElementById('videoTitle').innerText = data.error;
                    document.getElementById('downloadLinks').innerHTML = '';
                    return;
                }

                document.getElementById('videoTitle').innerText = data.title;
                let linksHtml = '';
                data.formats.forEach(format => {
                    if (format.quality) {
                        linksHtml += `<a href="${format.url}" target="_blank" class="block text-center bg-green-500 text-white py-1 px-3 rounded hover:bg-green-600">Download ${format.quality}</a>`;
                    }
                });
                document.getElementById('downloadLinks').innerHTML = linksHtml;
            } catch (error) {
                document.getElementById('videoTitle').innerText = "Failed to load data.";
            }
        }
    </script>
</body>
</html>
